services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=node_user
      - DB_PASSWORD=node_secure_pass
      - DB_NAME=node_db
      - DB_PORT=5432
    depends_on:
      - db
    volumes:
      - /app/node_modules  

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: node_user
      POSTGRES_PASSWORD: node_secure_pass
      POSTGRES_DB: node_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: